services:
  knowledge-service:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Mount local knowledge-base repo (read-only)
      - /Users/akhera/Desktop/Repositories/knowledge-base:/data/knowledge-repo:ro
      # Mount a test workspace directory (read-only)
      - /tmp/test-workspace:/workspace:ro
    environment:
      - KNOWLEDGE_REPO_PATH=/data/knowledge-repo
      - WORKSPACE_PATH=/workspace
      - SYNC_INTERVAL=300
      - QMD_INDEX_NAME=knowledge
      # Skip git clone since we're mounting the repo directly
      - SKIP_GIT_CLONE=true
    restart: unless-stopped
