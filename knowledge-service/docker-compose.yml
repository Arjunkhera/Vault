services:
  knowledge-service:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ~/workspace:/workspace:ro
      # Optional: mount custom type definitions
      # - ./types:/app/types:ro
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - KNOWLEDGE_REPO_URL=${KNOWLEDGE_REPO_URL:-}
      - SYNC_INTERVAL=300
    restart: unless-stopped
