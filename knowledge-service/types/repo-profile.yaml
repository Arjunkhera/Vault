id: repo-profile
name: Repository Profile
description: "Entry point for a repository — tech stack, key modules, how to build/test, dependencies"
required_scope:
  - repo
fields:
  hosting:
    required: false
    description: "Git hosting configuration (hostname and org/owner)"
  workflow:
    required: false
    description: "Git workflow configuration"
  workflow.strategy:
    required: false
    description: "How code changes are pushed and PR'd"
    values: [owner, fork, direct]
template: |
  ---
  type: repo-profile
  title: ""
  description: ""
  scope:
    program: ""
    repo: ""
  related: []
  tags: []
  mode: reference
  owner: ""
  last-verified: ""
  hosting:
    hostname: ""
    org: ""
  workflow:
    strategy: ""
    default-branch: main
    pr-target: main
    branch-convention: ""
  ---

  # Repository Name

  ## Overview

  ## Tech Stack

  ## Key Modules

  ## Build & Test

  ## Dependencies

  ## Git Workflow
