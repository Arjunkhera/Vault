# ── Vault Router — Standalone Dev Compose ─────────────────────────────────────
# For local development and testing of vault-router with 1 or 2 vault instances.
# In production, vault-router is part of the main Horus docker-compose.yml
# generated by the Horus CLI from config.yaml.
#
# Usage:
#   docker compose up        — start router + vault-personal
#   docker compose logs -f   — follow logs
#
# Requires the vault image to be built first:
#   docker compose -f ../knowledge-service/docker-compose.yml build

services:

  # ── Vault instance (personal) ───────────────────────────────────────────────
  vault-personal:
    image: ghcr.io/arjunkhera/horus/vault:latest
    ports:
      - "8001:8000"
    volumes:
      - ${KNOWLEDGE_REPO_PATH:-/tmp/vault-personal-kb}:/data/knowledge-repo:rw
      - vault-personal-workspace:/data/workspace
    environment:
      - KNOWLEDGE_REPO_PATH=/data/knowledge-repo
      - WORKSPACE_PATH=/data/workspace
      - QMD_INDEX_NAME=vault-personal
      - SYNC_INTERVAL=300
      - LOG_LEVEL=info
      - HOST=0.0.0.0
      - PORT=8000
    networks:
      - vault-router-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ── Vault Router ─────────────────────────────────────────────────────────────
  vault-router:
    build: .
    ports:
      - "${VAULT_ROUTER_PORT:-8400}:8400"
    environment:
      - VAULT_ENDPOINTS=personal=http://vault-personal:8000
      - VAULT_DEFAULT=personal
      - LOG_LEVEL=info
    depends_on:
      vault-personal:
        condition: service_healthy
    networks:
      - vault-router-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8400/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

networks:
  vault-router-net:
    driver: bridge

volumes:
  vault-personal-workspace:
